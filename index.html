<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LC Ventures</title>

    <style>
        body {
            margin: 0;
            background: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;

            background-image:
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);

            background-size: 40px 40px;
            z-index: -2;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            animation: float 20s ease-in-out infinite;
        }

        .blob1 {
            background: #0070f3;
            top: -200px;
            left: -150px;
        }

        .blob2 {
            background: #7c3aed;
            bottom: -250px;
            right: -150px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0px, 0px);
            }

            50% {
                transform: translate(80px, 40px);
            }

            100% {
                transform: translate(0px, 0px);
            }
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 140px 30px;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 140px;
        }

        h1 {
            font-size: 64px;
            line-height: 1.05;
            font-weight: 600;
            letter-spacing: -2px;
            margin: 0 0 24px;
        }

        p {
            font-size: 20px;
            color: #666;
            line-height: 1.8;
        }

        .footer {
            margin-top: 180px;
            font-size: 14px;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 42px;
            }

            .container {
                padding: 100px 25px;
            }

            .blob {
                width: 400px;
                height: 400px;
            }
        }
    </style>
</head>

<body>

    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <div class="container">

        <div class="logo">
            LC Ventures
        </div>

        <h1>
            Exploring what comes next.
        </h1>

        <p>
            Ideas in motion.
        </p>

        <div class="footer">
            Coming Soon
        </div>

    </div>

</body>

</html>
