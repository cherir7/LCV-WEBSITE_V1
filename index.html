<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC Ventures</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #030303;
    color: white;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.pattern {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
}

.pattern span {
    position: absolute;
    color: rgba(255,255,255,.10);
    font-size: 9px;
    font-weight: 300;
    line-height: 1;
    transition:
        color .18s ease,
        text-shadow .18s ease,
        opacity .18s ease;
    opacity: .75;
}

.vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background:
        radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.72) 100%);
}

.container {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
}

.center {
    text-align: center;
    animation: enterCenter 1.2s ease forwards;
}

@keyframes enterCenter {
    from {
        opacity: 0;
        transform: translateY(14px) scale(.985);
        filter: blur(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

.logo {
    position: relative;
    display: inline-block;
    margin-bottom: 42px;
    cursor: default;
    transition: filter .35s ease;
}

.logo:hover {
    filter:
        drop-shadow(0 0 18px rgba(255,255,255,.28))
        drop-shadow(0 0 46px rgba(255,255,255,.16));
}

.lcv {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(150px, 14vw, 290px);
    font-weight: 300;
    letter-spacing: -10px;
    line-height: .8;
    color: white;
    text-shadow:
        0 0 25px rgba(255,255,255,.08),
        0 0 80px rgba(255,255,255,.03);
    transition: text-shadow .35s ease;
}

.logo:hover .lcv {
    text-shadow:
        0 0 8px rgba(255,255,255,.45),
        0 0 22px rgba(255,255,255,.30),
        0 0 60px rgba(255,255,255,.18),
        0 0 120px rgba(255,255,255,.10);
}

.entures {
    position: absolute;
    right: -20px;
    bottom: 24px;
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(38px, 3.5vw, 78px);
    font-weight: 300;
    letter-spacing: -1px;
    background:
        linear-gradient(
            180deg,
            #ffffff 0%,
            #bdbdbd 45%,
            #707070 100%
        );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: filter .35s ease;
}

.logo:hover .entures {
    filter: brightness(1.75) drop-shadow(0 0 18px rgba(255,255,255,.35));
}

.tagline {
    color: #858585;
    font-size: 12px;
    letter-spacing: 5.8px;
    text-transform: uppercase;
}

.left,
.right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: #616161;
    font-size: 12px;
    letter-spacing: 4.2px;
    text-transform: uppercase;
    line-height: 2.9;
    animation: floatText 7s ease-in-out infinite;
}

.left {
    left: 8vw;
}

.right {
    right: 8vw;
    text-align: right;
    animation-delay: -3.5s;
}

@keyframes floatText {
    0%, 100% {
        transform: translateY(-50%);
        opacity: .72;
    }
    50% {
        transform: translateY(calc(-50% - 10px));
        opacity: .95;
    }
}

.glow-text {
    transition:
        color .25s ease,
        text-shadow .25s ease;
}

.footer {
    position: absolute;
    bottom: 54px;
    width: 100%;
    text-align: center;
    color: #4f4f4f;
    font-size: 11px;
    letter-spacing: 3.2px;
    text-transform: uppercase;
    line-height: 2.2;
}

.footer a {
    color: #6f6f6f;
    text-decoration: none;
    letter-spacing: 2px;
    text-transform: lowercase;
    transition: color .25s ease;
}

.footer a:hover {
    color: #ffffff;
}

@media(max-width: 900px) {
    body {
        overflow: hidden;
    }

    .left,
    .right {
        display: none;
    }

    .logo {
        margin-bottom: 28px;
    }

    .lcv {
        font-size: clamp(92px, 28vw, 130px);
        letter-spacing: -5px;
    }

    .entures {
        font-size: clamp(30px, 9vw, 44px);
        right: -8px;
        bottom: 10px;
    }

    .tagline {
        font-size: 9px;
        letter-spacing: 2.5px;
        padding: 0 20px;
    }

    .footer {
        bottom: 36px;
        font-size: 9px;
        letter-spacing: 2px;
        line-height: 2;
    }

    .pattern span {
        font-size: 8px;
    }
}
</style>
</head>

<body>

<div class="pattern"></div>
<div class="vignette"></div>

<div class="container">

    <div class="left glow-text">
        Ideas in Motion
        <br>
        Curiosity
        <br>
        Possibility
    </div>

    <div class="center">

        <div class="logo">
            <div class="lcv">LCV</div>
            <div class="entures">entures</div>
        </div>

        <div class="tagline glow-text">
            Exploring what comes next.
        </div>

    </div>

    <div class="right glow-text">
        Systems
        <br>
        Innovation
        <br>
        Future
    </div>

    <div class="footer">
        <div class="glow-text">Future under construction</div>
        <a href="mailto:hello@lcv-usa.com">hello@lcv-usa.com</a>
    </div>

</div>

<script>
const pattern = document.querySelector(".pattern");

let patternItems = [];

function createPattern() {
    pattern.innerHTML = "";
    patternItems = [];

    const spacingX = 16;
    const spacingY = 14;

    const cols = Math.ceil(window.innerWidth / spacingX) + 2;
    const rows = Math.ceil(window.innerHeight / spacingY) + 2;

    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
            const item = document.createElement("span");

            const isHeart = (x + y) % 2 === 0;
            item.textContent = isHeart ? "♥" : "B";

            const px = x * spacingX - spacingX;
            const py = y * spacingY - spacingY;

            item.style.left = px + "px";
            item.style.top = py + "px";

            pattern.appendChild(item);

            patternItems.push({
                el: item,
                x: px,
                y: py
            });
        }
    }
}

createPattern();

window.addEventListener("resize", createPattern);

window.addEventListener("mousemove", (e) => {
    const radius = 150;

    patternItems.forEach(item => {
        const dx = e.clientX - item.x;
        const dy = e.clientY - item.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < radius) {
            const strength = 1 - distance / radius;

            item.el.style.color =
                `rgba(255,255,255,${0.10 + strength * 0.90})`;

            item.el.style.textShadow =
                `0 0 ${10 * strength}px rgba(255,255,255,${0.45 * strength})`;

            item.el.style.opacity =
                `${0.75 + strength * 0.25}`;
        } else {
            item.el.style.color = "";
            item.el.style.textShadow = "";
            item.el.style.opacity = "";
        }
    });

    document.querySelectorAll(".glow-text").forEach(el => {
        const rect = el.getBoundingClientRect();

        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        const dx = e.clientX - cx;
        const dy = e.clientY - cy;

        const distance = Math.sqrt(dx * dx + dy * dy);
        const maxDistance = 180;

        if (distance < maxDistance) {
            const strength = 1 - distance / maxDistance;

            el.style.color =
                `rgba(255,255,255,${0.35 + strength * 0.65})`;

            el.style.textShadow =
                `0 0 ${12 * strength}px rgba(255,255,255,${0.35 * strength})`;
        } else {
            el.style.color = "";
            el.style.textShadow = "";
        }
    });
});
</script>

</body>

</html>
