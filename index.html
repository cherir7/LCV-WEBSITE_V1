<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC Ventures</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #030303;
    color: white;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.cursor-light {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
        radial-gradient(
            circle at var(--x,50%) var(--y,50%),
            rgba(255,255,255,.16),
            rgba(255,255,255,.045) 12%,
            transparent 32%
        );
    transition: background .12s ease;
}

.noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .026;
    z-index: 2;
    background-image:
        radial-gradient(rgba(255,255,255,.8) 1px, transparent 1px);
    background-size: 4px 4px;
}

.vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background:
        radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.72) 100%);
}

.glow {
    position: absolute;
    width: 980px;
    height: 980px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
        radial-gradient(circle, rgba(255,255,255,.075), rgba(255,255,255,.025) 34%, transparent 70%);
    filter: blur(135px);
    animation: breathe 12s ease-in-out infinite;
}

@keyframes breathe {
    0%, 100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: .82;
    }
    50% {
        transform: translate(-50%, -50%) scale(1.11);
        opacity: 1;
    }
}

.container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
}

.center {
    text-align: center;
    animation: enterCenter 1.2s ease forwards;
}

@keyframes enterCenter {
    from {
        opacity: 0;
        transform: translateY(14px) scale(.985);
        filter: blur(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

.logo {
    position: relative;
    display: inline-block;
    margin-bottom: 42px;
}

.lcv {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(150px, 14vw, 290px);
    font-weight: 300;
    letter-spacing: -10px;
    line-height: .8;
    color: white;
    text-shadow:
        0 0 25px rgba(255,255,255,.08),
        0 0 80px rgba(255,255,255,.03);
}

.entures {
    position: absolute;
    right: -20px;
    bottom: 24px;
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(38px, 3.5vw, 78px);
    font-weight: 300;
    letter-spacing: -1px;
    background:
        linear-gradient(
            180deg,
            #ffffff 0%,
            #bdbdbd 45%,
            #707070 100%
        );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.tagline {
    color: #858585;
    font-size: 12px;
    letter-spacing: 5.8px;
    text-transform: uppercase;
}

.left,
.right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: #616161;
    font-size: 12px;
    letter-spacing: 4.2px;
    text-transform: uppercase;
    line-height: 2.9;
    animation: floatText 7s ease-in-out infinite;
}

.left {
    left: 8vw;
}

.right {
    right: 8vw;
    text-align: right;
    animation-delay: -3.5s;
}

@keyframes floatText {
    0%, 100% {
        transform: translateY(-50%);
        opacity: .72;
    }
    50% {
        transform: translateY(calc(-50% - 10px));
        opacity: .95;
    }
}

.footer {
    position: absolute;
    bottom: 54px;
    width: 100%;
    text-align: center;
    color: #4f4f4f;
    font-size: 11px;
    letter-spacing: 3.2px;
    text-transform: uppercase;
    line-height: 2.2;
}

.footer div::before {
    content: "";
    display: inline-block;
    width: 5px;
    height: 5px;
    margin-right: 12px;
    border-radius: 50%;
    background: #777;
    vertical-align: middle;
    animation: pulse 2.4s ease-in-out infinite;
}

.footer a {
    color: #6f6f6f;
    text-decoration: none;
    letter-spacing: 2px;
    text-transform: lowercase;
    transition: color .25s ease;
}

.footer a:hover {
    color: #ffffff;
}

@keyframes pulse {
    0%, 100% {
        opacity: .28;
        transform: scale(.75);
    }
    50% {
        opacity: .95;
        transform: scale(1);
    }
}

@media(max-width: 900px) {
    body {
        overflow: auto;
    }

    .left,
    .right {
        display: none;
    }

    .logo {
        margin-bottom: 25px;
    }

    .lcv {
        font-size: 120px;
        letter-spacing: -6px;
    }

    .entures {
        font-size: 38px;
        right: -10px;
        bottom: 12px;
    }

    .tagline {
        font-size: 10px;
        letter-spacing: 3px;
    }

    .footer {
        bottom: 42px;
        font-size: 10px;
    }
}
</style>
</head>

<body>

<div class="cursor-light"></div>
<div class="noise"></div>
<div class="vignette"></div>
<div class="glow"></div>

<div class="container">

    <div class="left">
        Ideas in Motion
        <br>
        Curiosity
        <br>
        Possibility
    </div>

    <div class="center">

        <div class="logo">
            <div class="lcv">LCV</div>
            <div class="entures">entures</div>
        </div>

        <div class="tagline">
            Exploring what comes next.
        </div>

    </div>

    <div class="right">
        Systems
        <br>
        Innovation
        <br>
        Future
    </div>

    <div class="footer">
        <div>Future under construction</div>
        <a href="mailto:hello@lcv-usa.com">hello@lcv-usa.com</a>
    </div>

</div>

<script>
const light = document.querySelector(".cursor-light");

window.addEventListener("mousemove", (e) => {
    light.style.setProperty("--x", e.clientX + "px");
    light.style.setProperty("--y", e.clientY + "px");
});
</script>

</body>

</html>
