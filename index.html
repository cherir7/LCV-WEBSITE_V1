<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC Ventures</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #030303;
    color: white;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.cursor-light {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
        radial-gradient(
            circle at var(--x,50%) var(--y,50%),
            rgba(255,255,255,.16),
            rgba(255,255,255,.045) 12%,
            transparent 32%
        );
    transition: background .12s ease;
}

.noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .026;
    z-index: 2;
    background-image:
        radial-gradient(rgba(255,255,255,.8) 1px, transparent 1px);
    background-size: 4px 4px;
}

.vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background:
        radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.72) 100%);
}

.glow {
    position: absolute;
    width: 980px;
    height: 980px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
        radial-gradient(circle, rgba(255,255,255,.075), rgba(255,255,255,.025) 34%, transparent 70%);
    filter: blur(135px);
    animation: breathe 12s ease-in-out infinite;
}

@keyframes breathe {
    0%, 100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: .82;
    }
    50% {
        transform: translate(-50%, -50%) scale(1.11);
        opacity: 1;
    }
}

.container {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
}

.center {
    text-align: center;
    animation: enterCenter 1.2s ease forwards;
}

@keyframes enterCenter {
    from {
        opacity: 0;
        transform: translateY(14px) scale(.985);
        filter: blur(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

.logo {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 42px;
}

.logo-img {
    width: min(760px, 68vw);
    height: auto;
    display: block;
    opacity: .96;
    filter:
        drop-shadow(0 0 18px rgba(255,255,255,.06))
        drop-shadow(0 0 70px rgba(255,255,255,.025));
    transition: filter .35s ease, opacity .35s ease, transform .35s ease;
}

.logo-img:hover {
    opacity: 1;
    filter:
        drop-shadow(0 0 14px rgba(255,255,255,.28))
        drop-shadow(0 0 38px rgba(255,255,255,.16))
        drop-shadow(0 0 90px rgba(255,255,255,.08));
}

.tagline {
    color: #858585;
    font-size: 12px;
    letter-spacing: 5.8px;
    text-transform: uppercase;
    transition: color .25s ease;
    cursor: default;
}

.tagline:hover {
    color: #ffffff;
}

.left,
.right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: #616161;
    font-size: 12px;
    letter-spacing: 4.2px;
    text-transform: uppercase;
    line-height: 2.9;
    animation: floatText 7s ease-in-out infinite;
    transition: color .25s ease;
    cursor: default;
}

.left:hover,
.right:hover {
    color: #ffffff;
}

.left {
    left: 8vw;
}

.right {
    right: 8vw;
    text-align: right;
    animation-delay: -3.5s;
}

@keyframes floatText {
    0%, 100% {
        transform: translateY(-50%);
        opacity: .72;
    }
    50% {
        transform: translateY(calc(-50% - 10px));
        opacity: .95;
    }
}

.footer {
    position: absolute;
    bottom: 54px;
    width: 100%;
    text-align: center;
    color: #4f4f4f;
    font-size: 11px;
    letter-spacing: 3.2px;
    text-transform: uppercase;
    line-height: 2.2;
}

.footer div {
    transition: color .25s ease;
    cursor: default;
}

.footer div:hover {
    color: #ffffff;
}

.footer a {
    color: #6f6f6f;
    text-decoration: none;
    letter-spacing: 2px;
    text-transform: lowercase;
    transition: color .25s ease;
}

.footer a:hover {
    color: #ffffff;
}

@media(max-width: 900px) {
    html,
    body {
        width: 100%;
        overflow-x: hidden;
        overflow-y: hidden;
    }

    .left,
    .right {
        display: none;
    }

    .container {
        width: 100%;
        height: 100dvh;
        overflow: hidden;
    }

    .logo {
        margin-bottom: 28px;
    }

    .logo-img {
        width: 82vw;
    }

    .tagline {
        font-size: 9px;
        letter-spacing: 2.5px;
        padding: 0 20px;
    }

    .footer {
        bottom: 36px;
        font-size: 9px;
        letter-spacing: 2px;
        line-height: 2;
    }

    .glow {
        width: 520px;
        height: 520px;
        filter: blur(90px);
    }
}
</style>
</head>

<body>

<div class="cursor-light"></div>
<div class="noise"></div>
<div class="vignette"></div>
<div class="glow"></div>

<div class="container">

    <div class="left">
        Ideas in Motion
        <br>
        Curiosity
        <br>
        Possibility
    </div>

    <div class="center">

        <div class="logo">
            <img src="LCVlogo_white.svg" class="logo-img" alt="LC Ventures">
        </div>

        <div class="tagline">
            Exploring what comes next.
        </div>

    </div>

    <div class="right">
        Systems
        <br>
        Innovation
        <br>
        Future
    </div>

    <div class="footer">
        <div>Future under construction</div>
        <a href="mailto:hello@lcv-usa.com">hello@lcv-usa.com</a>
    </div>

</div>

<script>
const light = document.querySelector(".cursor-light");

window.addEventListener("mousemove", (e) => {
    light.style.setProperty("--x", e.clientX + "px");
    light.style.setProperty("--y", e.clientY + "px");
});
</script>

</body>

</html>
