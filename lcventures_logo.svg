<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">LCVentures Logo</title>
  <desc id="desc">A transparent SVG wordmark for LC Ventures with large LCV letters and smaller entures positioned near the golden-ratio point of the V.</desc>
  <style>
    .main {
      font-family: "Cormorant Garamond", "Times New Roman", Georgia, serif;
      font-weight: 300;
      fill: #ffffff;
      letter-spacing: -38px;
    }
    .sub {
      font-family: "Cormorant Garamond", "Times New Roman", Georgia, serif;
      font-weight: 300;
      fill: #d0d0d0;
      letter-spacing: -3px;
    }
  </style>
  <text class="main" x="60" y="300" font-size="310">LCV</text>
  <text class="sub" x="730" y="235" font-size="92">entures</text>
</svg>
